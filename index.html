<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ETS2 & OMSI 2 Kezdőknek</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e5e7eb;
}

header {
  border-bottom: 1px solid #334155;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav button {
  background: none;
  border: none;
  color: #e5e7eb;
  margin-left: 1rem;
  font-size: 1rem;
  cursor: pointer;
}

nav button.active {
  color: #38bdf8;
  border-bottom: 2px solid #38bdf8;
}

main {
  max-width: 1000px;
  margin: auto;
  padding: 2rem;
}

section { display: none; }
section.active { display: block; }

.card {
  background: #1e293b;
  padding: 1.5rem;
  border-radius: 12px;
  margin-bottom: 1.5rem;
  max-width: 350px;
}

img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  margin-top: 1rem;
}

a {
  color: #a855f7;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h2>SIMULÁTOR KEZDŐKNEK</h2>
  <nav>
    <button class="active" onclick="tab('home')">Főoldal</button>
    <button onclick="tab('gallery')">Képek</button>
    <button onclick="tab('spec')">Gépigény</button>
    <button onclick="tab('controls')">Hogyan kezdjem?</button>
    <button onclick="tab('mods')">Modok</button>
  </nav>
</header>

<main>

<section id="home" class="active">
  <div class="card">
    <h3>ETS2 & OMSI 2</h3>
    <p>Kezdőknek szóló útmutató és modok.</p>
  </div>
</section>

<section id="gallery">
  <div class="card">
    <h3>ETS2</h3>
    <img src="kamion.jpg">
  </div>
  <div class="card">
    <h3>OMSI 2</h3>
    <img src="bus.jpg">
  </div>
</section>

<section id="spec">
  <div class="card">
    <h3>Gépigény</h3>
    <p>ETS2: 8GB RAM<br>OMSI2: 16GB ajánlott</p>
  </div>
</section>

<section id="controls">
  <div class="card">
    <h3>Hogyan kezdjem?</h3>
    <p>Kormány vagy billentyűzet, tutorial ajánlott.</p>
  </div>
</section>

<section id="mods">
  <div class="card">
    <h3>OMSI2 – Délpest</h3>
    <img src="24939budapest-delpest.jpg">
    <a href="https://mods.club/omsi2-mods/omsi-2-budapest-delpest-map-v3-3/" target="_blank">
      🚍 Mod megnyitása
    </a>
  </div>
</section>

</main>

<script>
function tab(id) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

</body>
</html>
