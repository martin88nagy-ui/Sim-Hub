<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMD Quiz - Sim Hub</title>
  <style>
    :root {
      --bg-a: #09121d;
      --bg-b: #12263f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f5f9ff;
      --muted: #c7d4e5;
      --accent: #4ec3ff;
      --accent-deep: #0e7ac7;
      --ok-bg: rgba(49, 187, 110, 0.18);
      --ok-border: rgba(49, 187, 110, 0.48);
      --bad-bg: rgba(255, 92, 92, 0.18);
      --bad-border: rgba(255, 92, 92, 0.42);
      --code-bg: rgba(6, 13, 22, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(78, 195, 255, 0.2), transparent 25%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto;
      padding: 22px;
      border-radius: 28px;
      background: rgba(8, 18, 31, 0.78);
      border: 1px solid var(--panel-border);
      box-shadow: 0 26px 64px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
    }

    .hero {
      margin-bottom: 22px;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(78, 195, 255, 0.18), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .hero-links a {
      text-decoration: none;
      color: #fff;
      padding: 10px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      font-weight: 700;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .quiz-card {
      padding: 18px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
    }

    .level {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .quiz-card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.3;
    }

    .command {
      display: inline-block;
      margin: 0 0 14px;
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--code-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: Consolas, "Courier New", monospace;
      font-weight: 700;
    }

    .answer-list {
      display: grid;
      gap: 10px;
    }

    .answer-list button {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .answer-list button:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 195, 255, 0.55);
      background: rgba(78, 195, 255, 0.12);
    }

    .feedback {
      margin-top: 14px;
      min-height: 88px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(3, 10, 18, 0.5);
      color: var(--muted);
    }

    .feedback.correct {
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: #eaffe9;
    }

    .feedback.wrong {
      background: var(--bad-bg);
      border-color: var(--bad-border);
      color: #ffe7e7;
    }

    .feedback strong {
      display: block;
      margin-bottom: 6px;
      color: inherit;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 14px, 1180px);
        margin: 7px auto;
        padding: 12px;
      }

      .hero,
      .quiz-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>CMD Quiz</h1>
      <p>Valassz egy valaszt minden kerdesnel, es azonnal megkapod, hogy helyes vagy rossz volt-e, egy rovid magyarazattal egyutt.</p>
      <div class="hero-links">
        <a href="index.html">Vissza a fooldalra</a>
        <a href="windows-menu.html">Windows menu</a>
      </div>
    </section>

    <section class="quiz-grid" id="quiz-grid"></section>
  </main>

  <script>
    const questions = [
      {
        level: "Konnyu",
        title: "1. Mit csinal a dir parancs?",
        command: "dir",
        correct: "B",
        explanation: "A dir kilistazza az aktualis mappa fajljait es almappait.",
        answers: {
          A: "Torli a fajlokat",
          B: "Kilistazza a mappa tartalmat",
          C: "Atnevezi a fajlt",
          D: "Bezarja a CMD-t"
        }
      },
      {
        level: "Konnyu",
        title: "2. Mit csinal a cd?",
        command: "cd",
        correct: "B",
        explanation: "A cd a konyvtar valtasra szol, ezzel tudsz masik mappaba lepni.",
        answers: {
          A: "Fajl masolas",
          B: "Mappa valtas",
          C: "Internet kapcsolat",
          D: "Program inditas"
        }
      },
      {
        level: "Kozepes",
        title: "3. Mit csinal a cls?",
        command: "cls",
        correct: "B",
        explanation: "A cls kitisztitja a parancssor ablak tartalmat, de nem torol fajlokat.",
        answers: {
          A: "Torli a fajlokat",
          B: "Kitorli a kepernyot",
          C: "Kilep",
          D: "Uj mappat hoz letre"
        }
      },
      {
        level: "Kozepes",
        title: "4. Mit csinal a mkdir test?",
        command: "mkdir test",
        correct: "C",
        explanation: "A mkdir uj mappat hoz letre, ebben az esetben a mappa neve test lesz.",
        answers: {
          A: "Fajlt hoz letre",
          B: "Mappat torol",
          C: "Letrehoz egy test nevu mappat",
          D: "Megnyit egy fajlt"
        }
      },
      {
        level: "Kozepes",
        title: "5. Mit csinal a del file.txt?",
        command: "del file.txt",
        correct: "C",
        explanation: "A del a megadott fajlt torli, itt konkretan a file.txt fajlt.",
        answers: {
          A: "Megnyitja",
          B: "Atnevezi",
          C: "Torli a fajlt",
          D: "Masolja"
        }
      },
      {
        level: "Nehez",
        title: "6. Mit csinal a tasklist?",
        command: "tasklist",
        correct: "B",
        explanation: "A tasklist felsorolja az osszes futo folyamatot a gepen.",
        answers: {
          A: "Fajl lista",
          B: "Futo folyamatok listazasa",
          C: "Internet kapcsolat",
          D: "CPU hasznalat"
        }
      },
      {
        level: "Nehez",
        title: "7. Mit csinal a taskkill /IM chrome.exe /F?",
        command: "taskkill /IM chrome.exe /F",
        correct: "C",
        explanation: "A taskkill bezarja a megadott futtathato folyamatot, a /F pedig kenyszeritett leallitast jelent.",
        answers: {
          A: "Chrome telepites",
          B: "Chrome inditas",
          C: "Chrome kenyszeritett leallitasa",
          D: "Chrome frissites"
        }
      },
      {
        level: "Nehez",
        title: "8. Mit csinal a ipconfig /all?",
        command: "ipconfig /all",
        correct: "B",
        explanation: "Az ipconfig /all reszletes halozati adatokat jelenit meg, peldaul IP-cimet, adaptereket es DNS-informaciot.",
        answers: {
          A: "Internet kikapcsolas",
          B: "Halozati adatok reszletes megjelenitese",
          C: "IP torles",
          D: "Router reset"
        }
      },
      {
        level: "Nagyon nehez",
        title: "9. Mit csinal a netstat -an?",
        command: "netstat -an",
        correct: "B",
        explanation: "A netstat -an megmutatja az aktiv kapcsolatokat, a hallgatozo portokat es a cim-port adatokat szamformatumban.",
        answers: {
          A: "Internet gyorsitas",
          B: "Aktiv kapcsolatok es portok listazasa",
          C: "WiFi jelszo megjelenitese",
          D: "Pingel"
        }
      }
    ];

    const quizGrid = document.getElementById("quiz-grid");

    function renderQuiz() {
      questions.forEach((question, index) => {
        const card = document.createElement("article");
        card.className = "quiz-card";

        card.innerHTML = `
          <span class="level">${question.level}</span>
          <h2>${question.title}</h2>
          <p class="command">${question.command}</p>
          <div class="answer-list">
            ${Object.entries(question.answers)
              .map(([key, value]) => `<button type="button" data-question="${index}" data-answer="${key}">${key}) ${value}</button>`)
              .join("")}
          </div>
          <div class="feedback" id="feedback-${index}">
            Valassz egy lehetoseget a visszajelzeshez.
          </div>
        `;

        quizGrid.appendChild(card);
      });
    }

    function showFeedback(questionIndex, selectedAnswer) {
      const question = questions[questionIndex];
      const feedback = document.getElementById(`feedback-${questionIndex}`);
      const correct = selectedAnswer === question.correct;

      feedback.className = `feedback ${correct ? "correct" : "wrong"}`;
      feedback.innerHTML = `
        <strong>${correct ? "Helyes!" : "Rossz!"}</strong>
        ${question.explanation}
      `;
    }

    quizGrid.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-question]");
      if (!button) return;

      const questionIndex = Number(button.dataset.question);
      const selectedAnswer = button.dataset.answer;
      showFeedback(questionIndex, selectedAnswer);
    });

    renderQuiz();
  </script>
</body>
</html>
